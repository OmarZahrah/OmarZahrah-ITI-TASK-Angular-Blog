<section class="mx-auto max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
  <h1 class="mb-6 text-2xl font-bold">Create account</h1>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium">Username</label>
      <input formControlName="username" type="text" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 dark:border-slate-600 dark:bg-slate-900" />
      <p class="mt-1 text-sm text-red-500" *ngIf="registerForm.controls.username.touched && registerForm.controls.username.invalid">Username must be at least 3 characters.</p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium">Email</label>
      <input formControlName="email" type="email" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 dark:border-slate-600 dark:bg-slate-900" />
      <p class="mt-1 text-sm text-red-500" *ngIf="registerForm.controls.email.touched && registerForm.controls.email.invalid">Valid email is required.</p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium">Password</label>
      <input formControlName="password" type="password" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 dark:border-slate-600 dark:bg-slate-900" />
      <p class="mt-1 text-sm text-red-500" *ngIf="registerForm.controls.password.touched && registerForm.controls.password.invalid">Password must be at least 6 characters.</p>
    </div>

    <p class="text-sm text-red-500" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit" [disabled]="loading" class="w-full rounded-lg bg-indigo-600 px-4 py-2 font-medium text-white disabled:opacity-60">
      {{ loading ? 'Loading...' : 'Create account' }}
    </button>
  </form>
</section>
